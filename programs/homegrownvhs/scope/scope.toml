[program]
program_id = "com.homegrownvhs.scope"
program_version = "1.0.0"
abi_version = ">=1.0,<2.0"
program_name = "Scope"
author = "Adam Pflanzer"
license = "GPL-3.0"
categories = ["Analysis", "Signal", "Screen"]
program_type = "processing"
description = "Waveform monitor and chroma scope with graticule overlay"
hardware_compatibility = ["rev_b"]
core = "yuv444_30b"

[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "Trace Intensity"
control_mode = "linear"
initial_value = 800
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "Trace Width"
control_mode = "linear"
initial_value = 128
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "Graticule"
control_mode = "linear"
initial_value = 200
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Trace Color"
control_mode = "steps_4"
initial_value = 0
display_min_value = 1
display_max_value = 4
suffix_label = ""

[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "Background"
control_mode = "linear"
initial_value = 0
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "Unused"
control_mode = "linear"
initial_value = 0
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Display"
value_labels = ["Luma", "Chroma"]
initial_value_label = "Luma"

[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Graticule"
value_labels = ["Off", "On"]
initial_value_label = "On"

[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Background"
value_labels = ["Black", "Video"]
initial_value_label = "Black"

[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Unused"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Bypass"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "linear_potentiometer_12"
name_label = "Mix"
control_mode = "linear"
initial_value = 1023
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[preset]]
name = "Luma Green"
rotary_potentiometer_1 = 800
rotary_potentiometer_2 = 128
rotary_potentiometer_3 = 200
rotary_potentiometer_4 = 0
rotary_potentiometer_5 = 0
toggle_switch_7 = 0
toggle_switch_8 = 1
toggle_switch_9 = 0
linear_potentiometer_12 = 1023

[[preset]]
name = "Chroma"
rotary_potentiometer_1 = 800
rotary_potentiometer_2 = 128
rotary_potentiometer_3 = 200
rotary_potentiometer_4 = 0
rotary_potentiometer_5 = 0
toggle_switch_7 = 1
toggle_switch_8 = 1
toggle_switch_9 = 0
linear_potentiometer_12 = 1023

[[preset]]
name = "Overlay"
rotary_potentiometer_1 = 900
rotary_potentiometer_2 = 96
rotary_potentiometer_3 = 150
rotary_potentiometer_4 = 0
rotary_potentiometer_5 = 0
toggle_switch_7 = 0
toggle_switch_8 = 1
toggle_switch_9 = 1
linear_potentiometer_12 = 1023

[[preset]]
name = "White"
rotary_potentiometer_1 = 1023
rotary_potentiometer_2 = 64
rotary_potentiometer_3 = 100
rotary_potentiometer_4 = 682
rotary_potentiometer_5 = 0
toggle_switch_7 = 0
toggle_switch_8 = 0
toggle_switch_9 = 0
linear_potentiometer_12 = 1023
