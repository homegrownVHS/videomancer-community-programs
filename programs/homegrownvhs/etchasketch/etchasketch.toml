[program]
program_id = "com.homegrownvhs.etchasketch"
program_version = "1.0.0"
abi_version = ">=1.0,<2.0"
program_name = "Etch-a-Sketch"
author = "homegrownvhs"
license = "GPL-3.0"
categories = ["Game", "Pattern", "Screen"]
program_type = "processing"
description = "Persistent etch-a-sketch canvas with video reveal mode"
hardware_compatibility = ["rev_b"]
core = "yuv444_30b"
supported_timings = ["ntsc", "pal", "480p", "576p", "720p50", "720p5994", "720p60", "1080i50", "1080i5994", "1080i60"]

# Pot 1: Horizontal cursor position
[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "H Position"
control_mode = "linear"
initial_value = 512
display_min_value = 0
display_max_value = 100
suffix_label = "%"

# Pot 2: Vertical cursor position
[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "V Position"
control_mode = "linear"
initial_value = 512
display_min_value = 0
display_max_value = 100
suffix_label = "%"

# Pot 3: Brush size
[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "Brush Size"
control_mode = "linear"
initial_value = 128
display_min_value = 0
display_max_value = 63
suffix_label = "px"

# Pot 4: Draw color hue
[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Color"
control_mode = "steps_8"
initial_value = 0
display_min_value = 0
display_max_value = 7
suffix_label = ""

# Pot 5: Draw brightness
[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "Brightness"
control_mode = "linear"
initial_value = 800
display_min_value = 0
display_max_value = 100
suffix_label = "%"

# Pot 6: unused
[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "---"
control_mode = "linear"
initial_value = 0
display_min_value = 0
display_max_value = 100
suffix_label = ""

# Tog 7: Mode (Color / Video Reveal)
[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Mode"
value_labels = ["Color", "Video Reveal"]
initial_value_label = "Color"

# Tog 8: Cursor visibility
[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Cursor"
value_labels = ["Off", "On"]
initial_value_label = "On"

# Tog 9: unused
[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "---"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# Tog 10: Clear canvas
[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Clear"
value_labels = ["Off", "Clear"]
initial_value_label = "Off"

# Tog 11: Bypass
[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Bypass"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# Fader 12: Mix
[[parameter]]
parameter_id = "linear_potentiometer_12"
name_label = "Mix"
control_mode = "linear"
initial_value = 1023
display_min_value = 0
display_max_value = 100
suffix_label = "%"

# Presets
[[preset]]
name = "Color Draw"
rotary_potentiometer_1 = 512
rotary_potentiometer_2 = 512
rotary_potentiometer_3 = 128
rotary_potentiometer_4 = 0
rotary_potentiometer_5 = 800
rotary_potentiometer_6 = 0
toggle_switch_7 = 0
toggle_switch_8 = 1
toggle_switch_9 = 0
toggle_switch_10 = 0
toggle_switch_11 = 0
linear_potentiometer_12 = 1023

[[preset]]
name = "Video Reveal"
rotary_potentiometer_1 = 512
rotary_potentiometer_2 = 512
rotary_potentiometer_3 = 256
rotary_potentiometer_4 = 0
rotary_potentiometer_5 = 800
rotary_potentiometer_6 = 0
toggle_switch_7 = 1
toggle_switch_8 = 1
toggle_switch_9 = 0
toggle_switch_10 = 0
toggle_switch_11 = 0
linear_potentiometer_12 = 1023

[[preset]]
name = "Fine Pen"
rotary_potentiometer_1 = 512
rotary_potentiometer_2 = 512
rotary_potentiometer_3 = 16
rotary_potentiometer_4 = 3
rotary_potentiometer_5 = 1023
rotary_potentiometer_6 = 0
toggle_switch_7 = 0
toggle_switch_8 = 1
toggle_switch_9 = 0
toggle_switch_10 = 0
toggle_switch_11 = 0
linear_potentiometer_12 = 1023

[[preset]]
name = "Wide Brush"
rotary_potentiometer_1 = 512
rotary_potentiometer_2 = 512
rotary_potentiometer_3 = 700
