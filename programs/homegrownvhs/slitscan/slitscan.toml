[program]
program_id = "com.homegrownvhs.slitscan"
program_version = "2.0.0"
abi_version = ">=1.0,<2.0"
program_name = "Slit-Scan"
author = "Adam Pflanzer"
license = "GPL-3.0"
categories = ["Temporal", "Warp"]
program_type = "processing"
description = "8-mode temporal slit-scan with slices, Y/UV split, and radial/diamond/noise patterns"
hardware_compatibility = ["rev_b"]
core = "yuv444_30b"

# --- Knobs ---

[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "Amount"
control_mode = "linear"
initial_value = 0
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "Offset"
control_mode = "linear"
initial_value = 0
display_min_value = 0
display_max_value = 360
suffix_label = "deg"

[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "Slices"
control_mode = "linear"
initial_value = 0
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Mode"
control_mode = "steps_8"
initial_value = 0
display_min_value = 1
display_max_value = 8

[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "Split"
control_mode = "linear"
initial_value = 512
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "Luma Depth"
control_mode = "linear"
initial_value = 0
display_min_value = 0
display_max_value = 100
suffix_label = "%"

# --- Toggles ---

[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Reverse"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Luma Only"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Bounce"
value_labels = ["Normal", "Fold"]
initial_value_label = "Normal"

[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Deep"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Bypass"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# --- Fader ---

[[parameter]]
parameter_id = "linear_potentiometer_12"
name_label = "Mix"
control_mode = "linear"
initial_value = 1023
display_min_value = 0
display_max_value = 100
suffix_label = "%"
