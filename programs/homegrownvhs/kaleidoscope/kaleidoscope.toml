[program]
program_id = "com.homegrownvhs.kaleidoscope"
program_version = "1.0.0"
abi_version = ">=1.0,<2.0"
program_name = "Kaleidoscope"
author = "Adam Pflanzer"
license = "GPL-3.0"
categories = ["Mirror", "Warp", "Optics"]
program_type = "processing"
description = "N-fold mirror/tile with diagonal tilt, rotation animation, and color cycling"
hardware_compatibility = ["rev_b"]
core = "yuv444_30b"

# --- Knobs ---

[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "Segments"
control_mode = "steps_4"
initial_value = 512
display_min_value = 1
display_max_value = 4

[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "Tilt"
control_mode = "linear"
initial_value = 0
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "Spin"
control_mode = "linear"
initial_value = 0
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Offset"
control_mode = "linear"
initial_value = 0
display_min_value = 0
display_max_value = 360
suffix_label = "deg"

[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "Brightness"
control_mode = "linear"
initial_value = 1023
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "Saturation"
control_mode = "linear"
initial_value = 1023
display_min_value = 0
display_max_value = 100
suffix_label = "%"

# --- Toggles ---

[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Mirror"
value_labels = ["Tile", "Mirror"]
initial_value_label = "Mirror"

[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Color Cycle"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Bypass"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# --- Fader ---

[[parameter]]
parameter_id = "linear_potentiometer_12"
name_label = "Mix"
control_mode = "linear"
initial_value = 1023
display_min_value = 0
display_max_value = 100
suffix_label = "%"
