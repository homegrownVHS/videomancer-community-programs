name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate-scripts:
    name: Validate Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Check script syntax
        run: |
          bash -n scripts/setup.sh
          bash -n build_programs.sh

      - name: Run shellcheck
        run: |
          shellcheck scripts/setup.sh build_programs.sh || true

  validate-structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Verify required files
        run: |
          for file in LICENSE README.md CONTRIBUTING.md .gitignore; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Required file $file is missing"
              exit 1
            fi
          done
          echo "✓ All required files present"

      - name: Verify programs structure
        run: |
          if [ ! -d "programs" ]; then
            echo "ERROR: programs/ directory is missing"
            exit 1
          fi
          
          # Check that each program has required files
          for vendor_dir in programs/*/; do
            vendor=$(basename "$vendor_dir")
            for program_dir in "$vendor_dir"*/; do
              if [ -d "$program_dir" ]; then
                program=$(basename "$program_dir")
                echo "Checking $vendor/$program"
                
                # Check for TOML config
                if [ ! -f "$program_dir/${program}.toml" ]; then
                  echo "ERROR: Missing ${program}.toml in $vendor/$program"
                  exit 1
                fi
                
                # Check for VHDL file
                if [ ! -f "$program_dir/${program}.vhd" ]; then
                  echo "ERROR: Missing ${program}.vhd in $vendor/$program"
                  exit 1
                fi
                
                echo "✓ $vendor/$program structure valid"
              fi
            done
          done

  validate-markdown:
    name: Validate Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check markdown links
        run: |
          # Check main documentation files
          for file in README.md CONTRIBUTING.md; do
            echo "Checking links in $file"
            markdown-link-check "$file" --config .github/markdown-link-check.json || true
          done

  validate-licenses:
    name: Validate License Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Check license headers in program files
        run: |
          missing_headers=0
          for vhdl_file in programs/*/*.vhd programs/*/*/*.vhd; do
            if [ -f "$vhdl_file" ]; then
              if ! grep -q "SPDX-License-Identifier: GPL-3.0" "$vhdl_file"; then
                echo "WARNING: Missing or incorrect license header in $vhdl_file"
                missing_headers=$((missing_headers + 1))
              fi
            fi
          done
          
          for toml_file in programs/*/*.toml programs/*/*/*.toml; do
            if [ -f "$toml_file" ]; then
              if ! grep -q "SPDX-License-Identifier: GPL-3.0" "$toml_file"; then
                echo "WARNING: Missing or incorrect license header in $toml_file"
                missing_headers=$((missing_headers + 1))
              fi
            fi
          done
          
          if [ $missing_headers -gt 0 ]; then
            echo "⚠ Found $missing_headers file(s) with missing/incorrect license headers"
          else
            echo "✓ All program files have proper license headers"
          fi
